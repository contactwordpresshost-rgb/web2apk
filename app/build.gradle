plugins { id 'com.android.application' }
android {
    compileSdk 34
    namespace 'com.myapp'
    defaultConfig { applicationId 'com.myapp'; minSdk 21; targetSdk 34; versionCode 1; versionName "1.0" }
    buildTypes { release { minifyEnabled false; signingConfig signingConfigs.debug } }
    compileOptions { sourceCompatibility JavaVersion.VERSION_11; targetCompatibility JavaVersion.VERSION_11 }
}
dependencies { implementation 'androidx.appcompat:appcompat:1.7.0'; implementation 'com.google.android.material:material:1.12.0' }